name: Deploy website to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (default: main)"
        required: false
        default: "main"
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y optipng webp libxml2-utils
      - name: Build site
        run: |
          rsync -a --delete \
            --exclude=node_modules \
            --exclude=.claude \
            --exclude=.git \
            --exclude=.github \
            --exclude=.githooks \
            --exclude=.gitignore \
            --exclude=_site \
            --exclude=scripts \
            --exclude=Makefile \
            --exclude=package.json \
            --exclude=bun.lock \
            --exclude=CLAUDE.md \
            --exclude=README.md \
            --exclude=LICENSE \
            --exclude=.stylelintrc.json \
            --exclude=.htmlvalidate.json \
            . _site/
          bunx postcss _site/css/ --dir _site/css/ --use cssnano --no-map
          bun scripts/generate-rss.mjs _site/rss.xml _site
          bun scripts/generate-sitemap.mjs _site/sitemap.xml _site
      - name: Optimize images
        run: |
          find _site -name '*.png' -exec optipng -quiet -clobber {} +
          find _site -name '*.webp' | while IFS= read -r f; do cwebp -lossless -quiet "$f" -o "$f"; done
          find _site -name '*.svg' -exec bunx svgo --multipass --quiet {} +
      - name: Validate build
        run: |
          # RSS and sitemap must exist and be valid XML
          xmllint --noout _site/rss.xml
          xmllint --noout _site/sitemap.xml

          # Minified CSS must be smaller than source
          for f in css/*.css; do
            base=$(basename "$f")
            src_size=$(stat -c%s "$f")
            min_size=$(stat -c%s "_site/css/$base")
            if [ "$min_size" -ge "$src_size" ]; then
              echo "error: _site/css/$base ($min_size) is not smaller than $f ($src_size)" >&2
              exit 1
            fi
          done

          # At least one HTML file must exist
          html_count=$(find _site -name '*.html' | wc -l)
          if [ "$html_count" -eq 0 ]; then
            echo "error: no HTML files in _site/" >&2
            exit 1
          fi

          # Images should be optimized (optipng reports 0% reduction on already-optimized PNGs)
          for f in $(find _site -name '*.png'); do
            result=$(optipng -simulate "$f" 2>&1)
            if echo "$result" | grep -qv "is already optimized"; then
              echo "warning: $f may not be fully optimized" >&2
            fi
          done

          # SVGs should have been through svgo (check they don't contain common unoptimized patterns)
          for f in $(find _site -name '*.svg'); do
            if grep -q '<?xml' "$f" 2>/dev/null; then
              echo "warning: $f contains XML declaration (likely not svgo-optimized)" >&2
            fi
          done

          echo "Build validation passed: $html_count HTML files, RSS/sitemap valid, CSS minified"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-slim
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
